// Safe string cleaning - no regex
const cn=s=>(s||"").split("$").join("").split(",").join("").split(" ").join("").trim();

// Normalize date to YYYY-MM-DD
function nd(d){
  if(!d)return"";
  if(d.length>=10&&d[4]==="-")return d.slice(0,10);
  var p=d.split("/");
  if(p.length===3&&p[2].length===4)return p[2]+"-"+p[0].padStart(2,"0")+"-"+p[1].padStart(2,"0");
  return d;
}

// Proper CSV row parser - handles quoted commas
function csvRow(line){
  var res=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===","&&!inQ){res.push(cur.trim());cur="";}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}

// Normalize line endings - handles quoted multiline fields
function normLines(text){
  var out=[],cur="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){inQ=!inQ;cur+=c;}
    else if(!inQ&&(c==='\r'||c==='\n')){
      if(c==='\r'&&text[i+1]==='\n')i++;
      out.push(cur);cur="";
    } else {cur+=c;}
  }
  if(cur.length)out.push(cur);
  return out;
}

function parseBofA(text){
  var lines=normLines(text);
  var hi=-1;
  for(var i=0;i<lines.length;i++){
    var first=csvRow(lines[i])[0].trim().toLowerCase();
    if(first==="date"){hi=i;break;}
  }
  if(hi===-1)return[];

  // Extract ending balance from summary rows above header
  var eb=null;
  for(var i=0;i<hi;i++){
    if(lines[i].toLowerCase().indexOf("ending balance")!==-1){
      var cols=csvRow(lines[i]);
      for(var j=0;j<cols.length;j++){
        var v=parseFloat(cn(cols[j]));
        if(!isNaN(v)&&v>100){eb=v;break;}
      }
    }
  }

  var hdrs=csvRow(lines[hi]).map(function(h){return h.toLowerCase();});
  var di=hdrs.indexOf("date");
  var dsi=-1;for(var i=0;i<hdrs.length;i++){if(hdrs[i].indexOf("description")!==-1){dsi=i;break;}}
  var ai=hdrs.indexOf("amount");
  if(di===-1||dsi===-1||ai===-1)return[];

  var SKIP=["beginning balance","ending balance","total credits","total debits"];
  var res=[];
  for(var i=hi+1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=csvRow(line);
    var date=cols[di]||"";
    var desc=cols[dsi]||"";
    if(!date||!desc)continue;
    var skip=false;for(var s=0;s<SKIP.length;s++){if(desc.toLowerCase().indexOf(SKIP[s])!==-1){skip=true;break;}}
    if(skip)continue;
    var amt=parseFloat(cn(cols[ai]));
    if(isNaN(amt)||amt===0)continue;
    var rb=parseFloat(cn(cols[ai+1]||""))||null;
    var d=desc.toUpperCase();
    var cat="Other";
    if(d.indexOf("GOOGLE")!==-1&&d.indexOf("PAYROLL")!==-1)cat="Income";
    else if(d.indexOf("MORGAN STANLEY")!==-1||d.indexOf("ACH CREDIT")!==-1||d.indexOf("DIRECT DEP")!==-1)cat="Income";
    else if(d.indexOf("PUPS")!==-1)cat="Pets";
    else if(d.indexOf("AMAZON")!==-1)cat="Amazon";
    else if(d.indexOf("MARIANO")!==-1||d.indexOf("WALMART")!==-1||d.indexOf("ALDI")!==-1)cat="Supermarket";
    else if(d.indexOf("TST*")!==-1||d.indexOf("DOORDASH")!==-1||d.indexOf("GRUBHUB")!==-1||d.indexOf("STARBUCKS")!==-1||d.indexOf("CVS")!==-1||d.indexOf("5GUYS")!==-1||d.indexOf("OCEAN PRIME")!==-1)cat="Food & Drink";
    else if(d.indexOf("NETFLIX")!==-1||d.indexOf("SPOTIFY")!==-1||d.indexOf("APPLE.COM")!==-1||d.indexOf("HULU")!==-1||d.indexOf("GOOGLE *YOUTUB")!==-1)cat="Subscriptions";
    else if(d.indexOf("UBER")!==-1||d.indexOf("LYFT")!==-1||d.indexOf("PARKING")!==-1||d.indexOf("DIVVY")!==-1)cat="Uber";
    else if(d.indexOf("ROBINHOOD CARD")!==-1||d.indexOf("ROBINHOOD MONEY")!==-1)cat="Credit Card Payment";
    else if(d.indexOf("ROBINHOOD")!==-1||d.indexOf("FIDELITY")!==-1||d.indexOf("FUNDRISE")!==-1||d.indexOf("FID BKG")!==-1||d.indexOf("COINBASE")!==-1||d.indexOf("SOFI SECURITIES")!==-1)cat="Transfers";
    else if(d.indexOf("RENT")!==-1||d.indexOf("MORTGAGE")!==-1||d.indexOf("LEASE")!==-1)cat="Housing";
    else if(d.indexOf("COMED")!==-1)cat="Energy";
    else if(d.indexOf("ATT*")!==-1||d.indexOf("AT&T")!==-1)cat="AT&T";
    else if(d.indexOf("ELECTRIC")!==-1||d.indexOf("COMCAST")!==-1||d.indexOf("VERIZON")!==-1||d.indexOf("T-MOBILE")!==-1)cat="Utilities";
    else if(d.indexOf("PHARMACY")!==-1||d.indexOf("DOCTOR")!==-1||d.indexOf("FITNESS")!==-1)cat="Health";
    else if(d.indexOf("MYTH TRAINING")!==-1)cat="Personal Trainer";
    else if(d.indexOf("TARGET")!==-1||d.indexOf("ROSS")!==-1||d.indexOf("PRIMARK")!==-1||d.indexOf("TJ MAXX")!==-1||d.indexOf("TJMAXX")!==-1||d.indexOf("BURLINGTON")!==-1||d.indexOf("NORTH FACE")!==-1)cat="Shopping";
    else if(d.indexOf("ZELLE")!==-1||d.indexOf("VENMO")!==-1||d.indexOf("PAYPAL")!==-1)cat="Transfers";
    var txType=amt>0?"income":cat==="Transfers"?"transfer":"expense";
    res.push({id:"BofA-"+i+"-"+Date.now(),date:nd(date),description:desc,amount:Math.abs(amt),type:txType,category:cat,account:"Bank of America",runningBalance:rb,endingBalance:eb});
  }
  return res;
}

function parseFidelity(text){
  var lines=normLines(text);
  if(lines.length<2)return[];
  var sep=lines[0].indexOf("\t")!==-1?"\t":",";
  var hdrs=(sep==="\t"?lines[0].split("\t"):csvRow(lines[0])).map(function(h){return h.trim().toLowerCase();});
  var di=-1,aci=-1,si=-1,dsi=-1,ami=-1,qi=-1,pi=-1;
  for(var i=0;i<hdrs.length;i++){
    if(hdrs[i].indexOf("run date")!==-1||hdrs[i]==="date")di=i;
    if(hdrs[i]==="action")aci=i;
    if(hdrs[i]==="symbol")si=i;
    if(hdrs[i]==="description")dsi=i;
    if(hdrs[i]==="amount")ami=i;
    if(hdrs[i]==="quantity")qi=i;
    if(hdrs[i]==="price")pi=i;
  }
  if(di===-1)return[];
  var res=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=sep==="\t"?lines[i].split("\t"):csvRow(lines[i]);
    var date=cols[di]||"",action=cols[aci]||"",symbol=cols[si]||"";
    var desc=cols[dsi]||action||symbol||"Unknown";
    var amt=parseFloat(cn(cols[ami]))||0;
    var qty=parseFloat(cn(cols[qi]))||0;
    var price=parseFloat(cn(cols[pi]))||0;
    if(!date||amt===0&&qty===0)continue;
    var ac=action.toUpperCase();
    var cat="Trade";
    if(ac.indexOf("BOUGHT")!==-1||ac.indexOf("BUY")!==-1||ac.indexOf("REINVESTMENT")!==-1)cat="Buy";
    else if(ac.indexOf("SOLD")!==-1||ac.indexOf("SELL")!==-1)cat="Sell";
    else if(ac.indexOf("DIVIDEND")!==-1)cat="Dividend";
    else if(ac.indexOf("INTEREST")!==-1)cat="Interest";
    res.push({id:"Fidelity-"+i+"-"+Date.now(),date:nd(date),description:symbol?(symbol+" — "+desc.slice(0,40)):desc.slice(0,50),amount:Math.abs(amt)||Math.abs(qty*price),type:"investment",category:cat,account:"Fidelity"});
  }
  return res;
}

function parseGeneric(text,acct){
  var lines=normLines(text).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var sep=lines[0].indexOf("\t")!==-1?"\t":",";
  var hdrs=(sep==="\t"?lines[0].split("\t"):csvRow(lines[0])).map(function(h){return h.trim().toLowerCase();});
  var res=[];
  for(var i=1;i<lines.length;i++){
    var cols=sep==="\t"?lines[i].split("\t"):csvRow(lines[i]);
    var obj={};hdrs.forEach(function(h,idx){obj[h]=cols[idx]||"";});
    var date=nd(obj["date"]||obj["transaction date"]||obj["activity date"]||obj["trade date"]||"");
    var desc=obj["description"]||obj["name"]||obj["symbol"]||"Unknown";
    var amt=parseFloat(cn(obj["amount"]||obj["net amount"]||obj["total"]||"0"))||0;
    if(!date||amt===0)continue;
    var inv=acct==="Robinhood"||acct==="Fidelity"||acct==="Crypto";
    res.push({id:acct+"-"+i+"-"+Date.now(),date:date,description:desc,amount:Math.abs(amt),type:inv?"investment":(amt>=0?"income":"expense"),category:obj["category"]||obj["type"]||(inv?"Trade":"Other"),account:acct});
  }
  return res;
}

function parseRobinhood(text){
  var lines=normLines(text).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var hdrs=csvRow(lines[0]).map(function(h){return h.trim().toLowerCase();});
  var res=[];
  for(var i=1;i<lines.length;i++){
    var cols=csvRow(lines[i]);
    var obj={};hdrs.forEach(function(h,idx){obj[h]=(cols[idx]||"").trim();});
    var code=(obj["trans code"]||"").trim();
    var sym=(obj["instrument"]||"").trim();
    var descRaw=(obj["description"]||sym).split("\n")[0].trim();
    // Strip CUSIP lines
    var desc=descRaw.replace(/CUSIP:.*/i,"").trim()||sym;
    var date=nd(obj["activity date"]||obj["process date"]||"");
    if(!date)continue;
    // Parse amount - Robinhood uses ($10.00) for debits, $10.00 for credits
    var amtRaw=(obj["amount"]||"0").replace(/[(),\s]/g,"").replace("$","");
    var isNeg=(obj["amount"]||"").indexOf("(")!==-1;
    var amt=parseFloat(amtRaw)*(isNeg?-1:1);
    if(isNaN(amt))amt=0;
    var qty=parseFloat(obj["quantity"]||"0")||0;
    var price=parseFloat((obj["price"]||"0").replace(/[$,]/g,""))||0;

    // Buy/sell transactions → investment type
    if(code==="Buy"||code==="BTO"){
      if(!sym)continue;
      res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:sym+" — "+desc,amount:Math.abs(amt),type:"investment",category:"Buy",account:"Robinhood",symbol:sym,qty:qty,price:price});
    } else if(code==="Sell"||code==="STC"||code==="BTC"){
      if(!sym)continue;
      res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:sym+" — "+desc,amount:Math.abs(amt),type:"investment",category:"Sell",account:"Robinhood",symbol:sym,qty:qty,price:price});
    } else if(code==="RTP"||code==="ACH"){
      // Bank transfers - skip, already tracked in BofA
    } else if(code==="MINT"){
      // Dividends/interest
      if(amt>0) res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:(sym?sym+" — ":"")+desc,amount:amt,type:"income",category:"Dividend",account:"Robinhood"});
    }
  }
  return res;
}

function parse(text,acct){
  if(acct==="Bank of America")return parseBofA(text);
  if(acct==="Fidelity")return parseFidelity(text);
  if(acct==="Robinhood")return parseRobinhood(text);
  return parseGeneric(text,acct);
}

// ── SVG Charts ──
function BarChart({data,keys,colors,height}){
  height=height||180;
  var w=600,h=height,pl=50,pr=10,pt=30,pb=30;
  var cw=w-pl-pr,ch=h-pt-pb;
  var maxV=1;
  data.forEach(function(d){keys.forEach(function(k){if((d[k]||0)>maxV)maxV=d[k]||0;});});
  var bw=Math.floor(cw/Math.max(data.length,1));
  var sw=Math.max(1,Math.floor(bw*0.8/keys.length));
  var gridLines=[0.25,0.5,0.75,1];
  return e("svg",{viewBox:"0 0 "+w+" "+h,style:{width:"100%",height:height}},
    gridLines.map(function(p){return e("line",{key:p,x1:pl,y1:pt+ch*(1-p),x2:pl+cw,y2:pt+ch*(1-p),stroke:"rgba(255,255,255,0.05)",strokeWidth:1});}),
    gridLines.map(function(p){return e("text",{key:"t"+p,x:pl-4,y:pt+ch*(1-p)+4,textAnchor:"end",fontSize:9,fill:C.textMuted},"$"+(maxV*p/1000).toFixed(0)+"k");}),
    data.map(function(d,i){
      var x=pl+i*bw+bw*0.1;
      return e("g",{key:i},
        keys.map(function(k,ki){
          var v=d[k]||0,bh=Math.max(1,(v/maxV)*ch);
          var barX=x+ki*sw, barY=pt+ch-bh;
          return e("g",{key:k},
            e("rect",{x:barX,y:barY,width:sw-1,height:bh,fill:colors[ki],opacity:0.85,rx:2}),
            v>0?e("text",{x:barX+(sw-1)/2,y:barY-6,textAnchor:"middle",fontSize:11,fill:"#FFFFFF",fontWeight:"700"},"$"+(v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0))):null
          );
        }),
        e("text",{x:pl+i*bw+bw/2,y:h-8,textAnchor:"middle",fontSize:9,fill:C.textMuted},d.month||d.label||"")
      );
    })
  );
}

function AreaChart({data,dataKey,color,height}){
  height=height||180;
  var w=600,h=height,pl=50,pr=10,pt=10,pb=30;
  var cw=w-pl-pr,ch=h-pt-pb;
  var vals=data.map(function(d){return d[dataKey]||0;});
  var maxV=Math.max.apply(null,vals.concat([1]));
  var minV=Math.min.apply(null,vals.concat([0]));
  var range=maxV-minV||1;
  var n=data.length;
  function px(i){return pl+(i/(n-1||1))*cw;}
  function py(v){return pt+ch-((v-minV)/range)*ch;}
  var pts=data.map(function(d,i){return px(i)+","+py(d[dataKey]||0);}).join(" ");
  var area="M"+px(0)+","+py(vals[0])+" "+data.map(function(d,i){return"L"+px(i)+","+py(d[dataKey]||0);}).join(" ")+" L"+px(n-1)+","+(pt+ch)+" L"+px(0)+","+(pt+ch)+" Z";
  var gridLines=[0.25,0.5,0.75,1];
  return e("svg",{viewBox:"0 0 "+w+" "+h,style:{width:"100%",height:height}},
    e("defs",null,e("linearGradient",{id:"ag",x1:"0",y1:"0",x2:"0",y2:"1"},e("stop",{offset:"0%",stopColor:color,stopOpacity:0.3}),e("stop",{offset:"100%",stopColor:color,stopOpacity:0}))),
    gridLines.map(function(p){return e("line",{key:p,x1:pl,y1:pt+ch*(1-p),x2:pl+cw,y2:pt+ch*(1-p),stroke:"rgba(255,255,255,0.05)",strokeWidth:1});}),
    gridLines.map(function(p){return e("text",{key:"t"+p,x:pl-4,y:pt+ch*(1-p)+4,textAnchor:"end",fontSize:9,fill:C.textMuted},"$"+((minV+range*p)/1000).toFixed(0)+"k");}),
    e("path",{d:area,fill:"url(#ag)"}),
    e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:2.5}),
    data.map(function(d,i){return e("circle",{key:i,cx:px(i),cy:py(d[dataKey]||0),r:3.5,fill:color});}),
    data.map(function(d,i){return e("text",{key:"l"+i,x:px(i),y:h-8,textAnchor:"middle",fontSize:9,fill:C.textMuted},d.month||d.label||"");})
  );
}

function DonutChart({data,size}){
  size=size||160;
  var cx=size/2,cy=size/2,r=size*0.35,ri=size*0.22;
  var total=data.reduce(function(s,d){return s+(d.value||0);},0)||1;
  var angle=-Math.PI/2;
  var slices=data.map(function(d,i){
    var sweep=(d.value/total)*Math.PI*2;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var xi1=cx+ri*Math.cos(angle-sweep),yi1=cy+ri*Math.sin(angle-sweep);
    var xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle);
    var large=sweep>Math.PI?1:0;
    return{path:"M"+x1+","+y1+" A"+r+","+r+" 0 "+large+",1 "+x2+","+y2+" L"+xi2+","+yi2+" A"+ri+","+ri+" 0 "+large+",0 "+xi1+","+yi1+" Z",color:d.color||PC[i%PC.length]};
  });
  return e("svg",{viewBox:"0 0 "+size+" "+size,style:{width:size,height:size}},
    slices.map(function(s,i){return e("path",{key:i,d:s.path,fill:s.color,stroke:C.bg,strokeWidth:1});})
  );
}

function ImportZone({onImport}){
  var [status,setStatus]=useState({});
  var [drag,setDrag]=useState(null);
  var refs={};Object.keys(AI).forEach(function(a){refs[a]=useRef();});
  function handle(file,acct){
    if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      var raw=ev.target.result;
      var parsed=parse(raw,acct);
      if(!parsed.length){setStatus(function(s){return Object.assign({},s,{[acct]:{ok:false,msg:"No valid rows found"}});});return;}
      // Save raw CSV for re-parsing later
      try{localStorage.setItem("fv_raw_"+acct,raw);}catch(x){}
      onImport(parsed,acct);
      setStatus(function(s){return Object.assign({},s,{[acct]:{ok:true,msg:"✓ "+parsed.length+" rows"}});});
    };
    r.readAsText(file);
  }
  return e("div",null,
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}},
      Object.entries(AI).map(function([acct,icon]){
        var color=AC[acct],st=status[acct];
        return e("div",{key:acct,
          onClick:function(){if(refs[acct].current)refs[acct].current.click();},
          onDragOver:function(ev){ev.preventDefault();setDrag(acct);},
          onDragLeave:function(){setDrag(null);},
          onDrop:function(ev){ev.preventDefault();setDrag(null);handle(ev.dataTransfer.files[0],acct);},
          style:{border:"2px dashed "+(drag===acct?color:st&&st.ok?C.teal:"rgba(255,255,255,0.1)"),borderRadius:14,padding:"20px 12px",textAlign:"center",cursor:"pointer",background:drag===acct?color+"10":"transparent",transition:"all 0.2s"}},
          e("div",{style:{fontSize:28,marginBottom:8}},icon),
          e("div",{style:{fontSize:12,fontWeight:600,color:C.text,marginBottom:4}},acct),
          e("div",{style:{fontSize:11,color:st?(st.ok?C.teal:C.red):C.textDim}},st?st.msg:"Drop CSV here"),
          e("input",{ref:refs[acct],type:"file",accept:".csv",style:{display:"none"},onChange:function(ev){handle(ev.target.files[0],acct);}})
        );
      })
    ),
    e("div",{style:{padding:"12px 16px",background:"rgba(255,193,80,0.05)",borderRadius:10,border:"1px solid "+C.border,fontSize:12,color:C.textDim,lineHeight:1.8}},

      "BofA: Online Banking → Download → CSV  |  Fidelity: Accounts & Trade → Account History → Download  |  Robinhood: Account → Statements & History → Export"
    )
  );
}

                  var col=isG?C.teal:C.purple;
                  var src=isG?"Google Payroll":"Morgan Stanley";
                  return e("tr",{key:t.id,style:{borderBottom:"1px solid rgba(255,255,255,0.035)"},onMouseEnter:function(ev){ev.currentTarget.style.background=C.bgHover;},onMouseLeave:function(ev){ev.currentTarget.style.background="transparent";}},
                    e("td",{style:{padding:"10px",color:C.textDim,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}},fmtD(t.date)),
                    e("td",{style:{padding:"10px",color:C.text,fontSize:12,maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
                    e("td",{style:{padding:"10px"}},e("span",{style:{background:col+"18",color:col,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:500}},src)),
                    e("td",{style:{padding:"10px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,fontSize:14,color:col,textAlign:"right"}},"+"+fmt(t.amount))
                  );
                }))
              )
            );
          })
        )
      ),

      // TRANSACTIONS
      tab==="transactions"&&e(Card,null,
        e(SecTitle,null,"Transactions ("+fil.length+")"),
        e("div",{style:{overflowX:"auto"}},
          e("table",{style:{width:"100%",borderCollapse:"collapse"}},
            e("thead",null,e("tr",{style:{borderBottom:"1px solid "+C.border}},
              ["Date","Description","Category","Account","Type","Amount"].map(function(h){return e("th",{key:h,style:{textAlign:h==="Amount"?"right":"left",padding:"0 12px 14px",fontSize:10,letterSpacing:2,color:C.textMuted,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}},h);})
            )),
            e("tbody",null,fil.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(t){
              var col=t.type==="income"?C.teal:t.type==="investment"?C.gold:t.type==="transfer"?C.textDim:C.red;
              return e("tr",{key:t.id,style:{borderBottom:"1px solid rgba(255,255,255,0.035)"},onMouseEnter:function(ev){ev.currentTarget.style.background=C.bgHover;},onMouseLeave:function(ev){ev.currentTarget.style.background="transparent";}},
                e("td",{style:{padding:"12px",color:C.textDim,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}},fmtD(t.date)),
                e("td",{style:{padding:"12px",color:C.text,fontSize:13,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
                e("td",{style:{padding:"12px"}},e("span",{style:{background:"rgba(255,255,255,0.05)",color:C.textDim,padding:"3px 10px",borderRadius:20,fontSize:11}},t.category)),
                e("td",{style:{padding:"12px"}},e("span",{style:{color:AC[t.account],fontSize:12}},(AI[t.account]||"")+" "+t.account)),
                e("td",{style:{padding:"12px",color:col,fontSize:11,textTransform:"capitalize"}},t.type),
                e("td",{style:{padding:"12px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,fontSize:14,color:col,textAlign:"right"}},(t.type==="income"?"+":t.type==="investment"?"→ ":t.type==="transfer"?"⇄ ":"-")+fmt(t.amount))
              );
            }))
          )
        )
      ),

      // INVESTMENTS
      tab==="investments"&&e("div",null,
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}},
          e(KPI,{label:"Total Invested",value:fmt(totInv),color:C.gold,icon:"💼"}),
          e(KPI,{label:"Positions",value:holdings.length,color:C.purple,icon:"🗂️"}),
          e(KPI,{label:"Accounts",value:[...new Set(holdings.map(function(h){return h.account;}))].length,color:C.teal,icon:"🏦"}),
          e(KPI,{label:"Live Prices",value:pLoad?"Loading...":Object.keys(prices).length+" fetched",color:C.orange,icon:"📡"})
        ),
        e(Card,null,
          e(SecTitle,{action:e("button",{onClick:function(){fetchPrices(holdings.map(function(h){return h.symbol;}));},style:{fontSize:11,background:"transparent",border:"1px solid "+C.border,borderRadius:6,color:C.textDim,padding:"4px 10px",fontFamily:"'JetBrains Mono',monospace"}},pLoad?"⟳ loading...":"↻ refresh prices")},"Holdings"),
          holdings.length>0?e("table",{style:{width:"100%",borderCollapse:"collapse"}},
            e("thead",null,e("tr",{style:{borderBottom:"1px solid "+C.border}},
              ["Symbol","Name","Account","Cost Basis","Live Price","Day %","Gain/Loss"].map(function(h){return e("th",{key:h,style:{textAlign:"left",padding:"0 10px 14px",fontSize:10,letterSpacing:2,color:C.textMuted,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}},h);})
            )),
            e("tbody",null,holdings.map(function(h,i){
              var lp=prices[h.symbol],gain=h.value-h.cost,gp2=h.cost>0?((gain/h.cost)*100).toFixed(1):0;
              return e("tr",{key:i,style:{borderBottom:"1px solid rgba(255,255,255,0.035)"},onMouseEnter:function(ev){ev.currentTarget.style.background=C.bgHover;},onMouseLeave:function(ev){ev.currentTarget.style.background="transparent";}},
                e("td",{style:{padding:"12px 10px",color:C.gold,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}},h.symbol),
                e("td",{style:{padding:"12px 10px",color:C.text,fontSize:12,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},h.name),
                e("td",{style:{padding:"12px 10px"}},e("span",{style:{color:AC[h.account],fontSize:11}},(AI[h.account]||"")+" "+h.account)),
                e("td",{style:{padding:"12px 10px",fontFamily:"'JetBrains Mono',monospace",color:C.textDim,fontSize:13}},fmt(h.cost)),
                e("td",{style:{padding:"12px 10px",fontFamily:"'JetBrains Mono',monospace",color:lp?C.text:C.textMuted,fontSize:13}},lp?"$"+lp.price.toFixed(2):pLoad?"...":"—"),
                e("td",{style:{padding:"12px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:lp?(lp.change>=0?C.teal:C.red):C.textMuted}},lp?fmtP(lp.change):"—"),
                e("td",{style:{padding:"12px 10px",fontFamily:"'JetBrains Mono',monospace",color:gain>=0?C.teal:C.red,fontSize:13}},fmt(gain)+" ("+gp2+"%)")
              );
            }))
          ):e("div",{style:{textAlign:"center",padding:40,color:C.textDim}},"Import Fidelity, Robinhood, or Crypto CSVs to see holdings")
        )
      ),

      // GOALS
      tab==="goals"&&e("div",null,
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}},
          e("div",{style:{color:C.textDim,fontSize:14}},goals.length+" active goals"),
          e("button",{onClick:function(){setShowGF(function(v){return !v;});},style:{padding:"9px 20px",background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",border:"none",borderRadius:8,color:"#07080A",fontWeight:700,fontSize:12,letterSpacing:1}},"＋ ADD GOAL")
        ),
        showGF&&e(Card,{style:{marginBottom:24}},
          e(SecTitle,null,"New Goal"),
          e("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 80px auto",gap:12,alignItems:"flex-end"}},
            ...[{label:"Name",key:"name",type:"text",ph:"Dream Vacation"},{label:"Target ($)",key:"target",type:"number",ph:"10000"},{label:"Saved ($)",key:"current",type:"number",ph:"0"},{label:"Deadline",key:"deadline",type:"month",ph:""},{label:"Icon",key:"icon",type:"text",ph:"🎯"}].map(function(f){
              return e("div",{key:f.key},
                e("label",{style:{display:"block",fontSize:10,color:C.textMuted,marginBottom:6,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}},f.label),
                e("input",{type:f.type,placeholder:f.ph,value:newG[f.key],onChange:function(ev){var v=ev.target.value;setNewG(function(g){return Object.assign({},g,{[f.key]:v});});},style:inp})
              );
            }),
            e("button",{onClick:function(){
              if(!newG.name||!newG.target)return;
              saveGoals(goals.concat([{id:Date.now(),name:newG.name,target:+newG.target,current:+newG.current||0,deadline:newG.deadline,icon:newG.icon,color:GC[goals.length%GC.length]}]));
              setNewG({name:"",target:"",current:"",deadline:"",icon:"🎯"});setShowGF(false);
            },style:{padding:"10px",background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",border:"none",borderRadius:8,color:"#07080A",fontWeight:700,fontSize:12}},"SAVE")
          )
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}},
          goals.map(function(g){
            var pct=Math.min((g.current/g.target)*100,100);
            return e(Card,{key:g.id,style:{borderColor:g.color+"30",position:"relative",overflow:"hidden"}},
              e("div",{style:{position:"absolute",top:0,left:0,height:3,width:pct+"%",background:"linear-gradient(90deg,"+g.color+","+g.color+"88)"}}),
              e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}},
                e("div",null,e("div",{style:{fontSize:28,marginBottom:6}},g.icon),e("div",{style:{fontSize:17,fontWeight:600,color:C.text}},g.name),g.deadline&&e("div",{style:{fontSize:11,color:C.textMuted,fontFamily:"'JetBrains Mono',monospace"}},"By "+g.deadline)),
                e("div",{style:{display:"flex",gap:10,alignItems:"center"}},
                  e("div",{style:{fontSize:24,fontFamily:"'Playfair Display',serif",color:g.color,fontWeight:700}},pct.toFixed(0)+"%"),
                  e("button",{onClick:function(){saveGoals(goals.filter(function(x){return x.id!==g.id;}));},style:{background:"rgba(255,94,108,0.1)",border:"none",borderRadius:6,color:C.red,padding:"4px 8px",fontSize:12}},"✕")
                )
              ),
              e("div",{style:{background:"rgba(255,255,255,0.05)",borderRadius:8,height:8,overflow:"hidden",marginBottom:16}},e("div",{style:{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+g.color+","+g.color+"88)",borderRadius:8}})),
              e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
                [["SAVED",fmt(g.current),C.teal],["REMAINING",fmt(g.target-g.current),C.red],["GOAL",fmt(g.target),C.text]].map(function(x){
                  return e("div",{key:x[0],style:{textAlign:"center"}},e("div",{style:{fontSize:10,color:C.textMuted,marginBottom:3,letterSpacing:1.5,fontFamily:"'JetBrains Mono',monospace"}},x[0]),e("div",{style:{fontFamily:"'JetBrains Mono',monospace",color:x[2],fontWeight:600,fontSize:13}},x[1]));
                })
              )
            );
          })
        )
      ),

      // IMPORT
      tab==="import"&&e(Card,null,
        e(SecTitle,null,"Import Account Data"),
        e("p",{style:{color:C.textDim,fontSize:14,marginBottom:24,lineHeight:1.7}},"Drop your CSV files below. Data saves to this browser automatically — import once per device."),
        e(ImportZone,{onImport:doImport})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
})();
</script>
</body>
</html>
