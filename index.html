// Safe string cleaning - no regex
const cn=s=>(s||"").split("$").join("").split(",").join("").split(" ").join("").trim();

// Normalize date to YYYY-MM-DD
function nd(d){
  if(!d)return"";
  if(d.length>=10&&d[4]==="-")return d.slice(0,10);
  var p=d.split("/");
  if(p.length===3&&p[2].length===4)return p[2]+"-"+p[0].padStart(2,"0")+"-"+p[1].padStart(2,"0");
  return d;
}

// Proper CSV row parser - handles quoted commas
function csvRow(line){
  var res=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===","&&!inQ){res.push(cur.trim());cur="";}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}

// Normalize line endings - handles quoted multiline fields
function normLines(text){
  var out=[],cur="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){inQ=!inQ;cur+=c;}
    else if(!inQ&&(c==='\r'||c==='\n')){
      if(c==='\r'&&text[i+1]==='\n')i++;
      out.push(cur);cur="";
    } else {cur+=c;}
  }
  if(cur.length)out.push(cur);
  return out;
}

function parseBofA(text){
  var lines=normLines(text);
  var hi=-1;
  for(var i=0;i<lines.length;i++){
    var first=csvRow(lines[i])[0].trim().toLowerCase();
    if(first==="date"){hi=i;break;}
  }
  if(hi===-1)return[];

  // Extract ending balance from summary rows above header
  var eb=null;
  for(var i=0;i<hi;i++){
    if(lines[i].toLowerCase().indexOf("ending balance")!==-1){
      var cols=csvRow(lines[i]);
      for(var j=0;j<cols.length;j++){
        var v=parseFloat(cn(cols[j]));
        if(!isNaN(v)&&v>100){eb=v;break;}
      }
    }
  }

  var hdrs=csvRow(lines[hi]).map(function(h){return h.toLowerCase();});
  var di=hdrs.indexOf("date");
  var dsi=-1;for(var i=0;i<hdrs.length;i++){if(hdrs[i].indexOf("description")!==-1){dsi=i;break;}}
  var ai=hdrs.indexOf("amount");
  if(di===-1||dsi===-1||ai===-1)return[];

  var SKIP=["beginning balance","ending balance","total credits","total debits"];
  var res=[];
  for(var i=hi+1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=csvRow(line);
    var date=cols[di]||"";
    var desc=cols[dsi]||"";
    if(!date||!desc)continue;
    var skip=false;for(var s=0;s<SKIP.length;s++){if(desc.toLowerCase().indexOf(SKIP[s])!==-1){skip=true;break;}}
    if(skip)continue;
    var amt=parseFloat(cn(cols[ai]));
    if(isNaN(amt)||amt===0)continue;
    var rb=parseFloat(cn(cols[ai+1]||""))||null;
    var d=desc.toUpperCase();
    var cat="Other";
    if(d.indexOf("GOOGLE")!==-1&&d.indexOf("PAYROLL")!==-1)cat="Income";
    else if(d.indexOf("MORGAN STANLEY")!==-1||d.indexOf("ACH CREDIT")!==-1||d.indexOf("DIRECT DEP")!==-1)cat="Income";
    else if(d.indexOf("PUPS")!==-1)cat="Pets";
    else if(d.indexOf("AMAZON")!==-1)cat="Amazon";
    else if(d.indexOf("MARIANO")!==-1||d.indexOf("WALMART")!==-1||d.indexOf("ALDI")!==-1)cat="Supermarket";
    else if(d.indexOf("TST*")!==-1||d.indexOf("DOORDASH")!==-1||d.indexOf("GRUBHUB")!==-1||d.indexOf("STARBUCKS")!==-1||d.indexOf("CVS")!==-1||d.indexOf("5GUYS")!==-1||d.indexOf("OCEAN PRIME")!==-1)cat="Food & Drink";
    else if(d.indexOf("NETFLIX")!==-1||d.indexOf("SPOTIFY")!==-1||d.indexOf("APPLE.COM")!==-1||d.indexOf("HULU")!==-1||d.indexOf("GOOGLE *YOUTUB")!==-1)cat="Subscriptions";
    else if(d.indexOf("UBER")!==-1||d.indexOf("LYFT")!==-1||d.indexOf("PARKING")!==-1||d.indexOf("DIVVY")!==-1)cat="Uber";
    else if(d.indexOf("ROBINHOOD CARD")!==-1||d.indexOf("ROBINHOOD MONEY")!==-1)cat="Credit Card Payment";
    else if(d.indexOf("ROBINHOOD")!==-1||d.indexOf("FIDELITY")!==-1||d.indexOf("FUNDRISE")!==-1||d.indexOf("FID BKG")!==-1||d.indexOf("COINBASE")!==-1||d.indexOf("SOFI SECURITIES")!==-1)cat="Transfers";
    else if(d.indexOf("RENT")!==-1||d.indexOf("MORTGAGE")!==-1||d.indexOf("LEASE")!==-1)cat="Housing";
    else if(d.indexOf("COMED")!==-1)cat="Energy";
    else if(d.indexOf("ATT*")!==-1||d.indexOf("AT&T")!==-1)cat="AT&T";
    else if(d.indexOf("ELECTRIC")!==-1||d.indexOf("COMCAST")!==-1||d.indexOf("VERIZON")!==-1||d.indexOf("T-MOBILE")!==-1)cat="Utilities";
    else if(d.indexOf("PHARMACY")!==-1||d.indexOf("DOCTOR")!==-1||d.indexOf("FITNESS")!==-1)cat="Health";
    else if(d.indexOf("MYTH TRAINING")!==-1)cat="Personal Trainer";
    else if(d.indexOf("TARGET")!==-1||d.indexOf("ROSS")!==-1||d.indexOf("PRIMARK")!==-1||d.indexOf("TJ MAXX")!==-1||d.indexOf("TJMAXX")!==-1||d.indexOf("BURLINGTON")!==-1||d.indexOf("NORTH FACE")!==-1)cat="Shopping";
    else if(d.indexOf("ZELLE")!==-1||d.indexOf("VENMO")!==-1||d.indexOf("PAYPAL")!==-1)cat="Transfers";
    var txType=amt>0?"income":cat==="Transfers"?"transfer":"expense";
    res.push({id:"BofA-"+i+"-"+Date.now(),date:nd(date),description:desc,amount:Math.abs(amt),type:txType,category:cat,account:"Bank of America",runningBalance:rb,endingBalance:eb});
  }
  return res;
}

function parseFidelity(text){
  var lines=normLines(text);
  if(lines.length<2)return[];
  var sep=lines[0].indexOf("\t")!==-1?"\t":",";
  var hdrs=(sep==="\t"?lines[0].split("\t"):csvRow(lines[0])).map(function(h){return h.trim().toLowerCase();});
  var di=-1,aci=-1,si=-1,dsi=-1,ami=-1,qi=-1,pi=-1;
  for(var i=0;i<hdrs.length;i++){
    if(hdrs[i].indexOf("run date")!==-1||hdrs[i]==="date")di=i;
    if(hdrs[i]==="action")aci=i;
    if(hdrs[i]==="symbol")si=i;
    if(hdrs[i]==="description")dsi=i;
    if(hdrs[i]==="amount")ami=i;
    if(hdrs[i]==="quantity")qi=i;
    if(hdrs[i]==="price")pi=i;
  }
  if(di===-1)return[];
  var res=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=sep==="\t"?lines[i].split("\t"):csvRow(lines[i]);
    var date=cols[di]||"",action=cols[aci]||"",symbol=cols[si]||"";
    var desc=cols[dsi]||action||symbol||"Unknown";
    var amt=parseFloat(cn(cols[ami]))||0;
    var qty=parseFloat(cn(cols[qi]))||0;
    var price=parseFloat(cn(cols[pi]))||0;
    if(!date||amt===0&&qty===0)continue;
    var ac=action.toUpperCase();
    var cat="Trade";
    if(ac.indexOf("BOUGHT")!==-1||ac.indexOf("BUY")!==-1||ac.indexOf("REINVESTMENT")!==-1)cat="Buy";
    else if(ac.indexOf("SOLD")!==-1||ac.indexOf("SELL")!==-1)cat="Sell";
    else if(ac.indexOf("DIVIDEND")!==-1)cat="Dividend";
    else if(ac.indexOf("INTEREST")!==-1)cat="Interest";
    res.push({id:"Fidelity-"+i+"-"+Date.now(),date:nd(date),description:symbol?(symbol+" — "+desc.slice(0,40)):desc.slice(0,50),amount:Math.abs(amt)||Math.abs(qty*price),type:"investment",category:cat,account:"Fidelity"});
  }
  return res;
}

function parseGeneric(text,acct){
  var lines=normLines(text).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var sep=lines[0].indexOf("\t")!==-1?"\t":",";
  var hdrs=(sep==="\t"?lines[0].split("\t"):csvRow(lines[0])).map(function(h){return h.trim().toLowerCase();});
  var res=[];
  for(var i=1;i<lines.length;i++){
    var cols=sep==="\t"?lines[i].split("\t"):csvRow(lines[i]);
    var obj={};hdrs.forEach(function(h,idx){obj[h]=cols[idx]||"";});
    var date=nd(obj["date"]||obj["transaction date"]||obj["activity date"]||obj["trade date"]||"");
    var desc=obj["description"]||obj["name"]||obj["symbol"]||"Unknown";
    var amt=parseFloat(cn(obj["amount"]||obj["net amount"]||obj["total"]||"0"))||0;
    if(!date||amt===0)continue;
    var inv=acct==="Robinhood"||acct==="Fidelity"||acct==="Crypto";
    res.push({id:acct+"-"+i+"-"+Date.now(),date:date,description:desc,amount:Math.abs(amt),type:inv?"investment":(amt>=0?"income":"expense"),category:obj["category"]||obj["type"]||(inv?"Trade":"Other"),account:acct});
  }
  return res;
}

function parseRobinhood(text){
  var lines=normLines(text).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var hdrs=csvRow(lines[0]).map(function(h){return h.trim().toLowerCase();});
  var res=[];
  for(var i=1;i<lines.length;i++){
    var cols=csvRow(lines[i]);
    var obj={};hdrs.forEach(function(h,idx){obj[h]=(cols[idx]||"").trim();});
    var code=(obj["trans code"]||"").trim();
    var sym=(obj["instrument"]||"").trim();
    var descRaw=(obj["description"]||sym).split("\n")[0].trim();
    // Strip CUSIP lines
    var desc=descRaw.replace(/CUSIP:.*/i,"").trim()||sym;
    var date=nd(obj["activity date"]||obj["process date"]||"");
    if(!date)continue;
    // Parse amount - Robinhood uses ($10.00) for debits, $10.00 for credits
    var amtRaw=(obj["amount"]||"0").replace(/[(),\s]/g,"").replace("$","");
    var isNeg=(obj["amount"]||"").indexOf("(")!==-1;
    var amt=parseFloat(amtRaw)*(isNeg?-1:1);
    if(isNaN(amt))amt=0;
    var qty=parseFloat(obj["quantity"]||"0")||0;
    var price=parseFloat((obj["price"]||"0").replace(/[$,]/g,""))||0;

    // Buy/sell transactions → investment type
    if(code==="Buy"||code==="BTO"){
      if(!sym)continue;
      res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:sym+" — "+desc,amount:Math.abs(amt),type:"investment",category:"Buy",account:"Robinhood",symbol:sym,qty:qty,price:price});
    } else if(code==="Sell"||code==="STC"||code==="BTC"){
      if(!sym)continue;
      res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:sym+" — "+desc,amount:Math.abs(amt),type:"investment",category:"Sell",account:"Robinhood",symbol:sym,qty:qty,price:price});
    } else if(code==="RTP"||code==="ACH"){
      // Bank transfers - skip, already tracked in BofA
    } else if(code==="MINT"){
      // Dividends/interest
      if(amt>0) res.push({id:"RH-"+i+"-"+Date.now(),date:date,description:(sym?sym+" — ":"")+desc,amount:amt,type:"income",category:"Dividend",account:"Robinhood"});
    }
  }
  return res;
}

function parsePortfolio(text){
  var lines=normLines(text).map(function(l){return l.trim();});
  var res=[];
  var today=new Date().toISOString().slice(0,10);

  function cleanUSD(s){
    if(!s)return 0;
    var v=s.replace(/US\$|,|\s/g,"").replace(/[()]/g,"");
    var n=parseFloat(v);
    return isNaN(n)?0:n;
  }

  var currentAccount="Robinhood";
  var currentSection="Stocks";
  var inDataSection=false;
  var hdrs=[];

  // Section name → account and display section
  var SECTION_LABELS={
    "stocks robinhood":"Stocks","qqq":"QQQ / SPY Hedge","spy":"QQQ / SPY Hedge",
    "metals":"Metals","mutual":"Mutual Funds","venture":"Mutual Funds",
    "international stocks":"International Stocks","international etf":"International ETFs"
  };

  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(!line)continue;
    var cols=csvRow(line);
    var first=(cols[0]||"").trim();
    var nonEmpty=cols.filter(function(c){return c.trim();}).length;

    // Section header: few non-empty cols and not a data header
    if(nonEmpty<=4&&first&&first!=="Ticker"&&first!=="TOTAL"&&!/^[A-Z]{1,6}$/.test(first)){
      var fl=first.toLowerCase();
      inDataSection=false;hdrs=[];
      // Detect account
      if(fl.indexOf("fidelity")!==-1)currentAccount="Fidelity";
      else if(fl.indexOf("sofi")!==-1)currentAccount="SoFi";
      else currentAccount="Robinhood";
      // Detect section label
      currentSection=first.replace(/\(.*\)/g,"").trim();
      continue;
    }

    // Header row
    if(first==="Ticker"){
      hdrs=cols.map(function(h){return h.trim().toLowerCase();});
      inDataSection=true;continue;
    }

    if(!inDataSection||!hdrs.length)continue;
    if(first==="TOTAL"||first==="total"||!first)continue;
    if(first==="#REF!"||first==="Innovation Fund")continue;

    var obj={};
    hdrs.forEach(function(h,idx){obj[h]=(cols[idx]||"").trim();});

    var sym=first.toUpperCase();
    var name=obj["portfolio"]||obj["instrument"]||sym;
    var cost=cleanUSD(obj["average value (usd)"]||obj["average value"]||"0");
    var currentVal=cleanUSD(obj["current value (usd)"]||obj["current value"]||"0");
    var qty=parseFloat(obj["qty"]||"0")||0;
    var csvPrice=cleanUSD(obj["current stock price"]||"0");
    var csvPlPct=parseFloat((obj["p/l (%)"]||"0").replace("%",""))||0;

    if(!sym||sym==="TOTAL"||cost===0)continue;

    res.push({
      id:"PF-"+sym+"-"+i,
      date:today,
      description:sym+" — "+name,
      amount:cost,
      type:"investment",
      category:"Buy",
      account:currentAccount,
      symbol:sym,
      qty:qty,
      currentValue:currentVal,
      csvPrice:csvPrice,
      csvPlPct:csvPlPct,
      portfolioSection:currentSection
    });
  }
  return res;
}

function parse(text,acct){
  if(acct==="Bank of America")return parseBofA(text);
  if(acct==="Fidelity")return parseFidelity(text);
  if(acct==="Robinhood"){
    // Auto-detect: if has "Ticker" column it's the custom portfolio CSV
    if(text.indexOf("Average Value")!==-1||text.indexOf("Stocks Robinhood")!==-1)return parsePortfolio(text);
    return parseRobinhood(text);
  }
  return parseGeneric(text,acct);
}

// ── SVG Charts ──
function BarChart({data,keys,colors,height}){
  height=height||180;
  var w=600,h=height,pl=50,pr=10,pt=30,pb=30;
  var cw=w-pl-pr,ch=h-pt-pb;
  var maxV=1;
  data.forEach(function(d){keys.forEach(function(k){if((d[k]||0)>maxV)maxV=d[k]||0;});});
  var bw=Math.floor(cw/Math.max(data.length,1));
  var sw=Math.max(1,Math.floor(bw*0.8/keys.length));
  var gridLines=[0.25,0.5,0.75,1];
  return e("svg",{viewBox:"0 0 "+w+" "+h,style:{width:"100%",height:height}},
    gridLines.map(function(p){return e("line",{key:p,x1:pl,y1:pt+ch*(1-p),x2:pl+cw,y2:pt+ch*(1-p),stroke:"rgba(255,255,255,0.05)",strokeWidth:1});}),
    gridLines.map(function(p){return e("text",{key:"t"+p,x:pl-4,y:pt+ch*(1-p)+4,textAnchor:"end",fontSize:9,fill:C.textMuted},"$"+(maxV*p/1000).toFixed(0)+"k");}),
    data.map(function(d,i){
      var x=pl+i*bw+bw*0.1;
      return e("g",{key:i},
        keys.map(function(k,ki){
          var v=d[k]||0,bh=Math.max(1,(v/maxV)*ch);
          var barX=x+ki*sw, barY=pt+ch-bh;
          return e("g",{key:k},
            e("rect",{x:barX,y:barY,width:sw-1,height:bh,fill:colors[ki],opacity:0.85,rx:2}),
            v>0?e("text",{x:barX+(sw-1)/2,y:barY-6,textAnchor:"middle",fontSize:11,fill:"#FFFFFF",fontWeight:"700"},"$"+(v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0))):null
          );
        }),
        e("text",{x:pl+i*bw+bw/2,y:h-8,textAnchor:"middle",fontSize:9,fill:C.textMuted},d.month||d.label||"")
      );
    })
  );
}

function AreaChart({data,dataKey,color,height}){
  height=height||180;
  var w=600,h=height,pl=50,pr=10,pt=10,pb=30;
  var cw=w-pl-pr,ch=h-pt-pb;
  var vals=data.map(function(d){return d[dataKey]||0;});
  var maxV=Math.max.apply(null,vals.concat([1]));
  var minV=Math.min.apply(null,vals.concat([0]));
  var range=maxV-minV||1;
  var n=data.length;
  function px(i){return pl+(i/(n-1||1))*cw;}
  function py(v){return pt+ch-((v-minV)/range)*ch;}
  var pts=data.map(function(d,i){return px(i)+","+py(d[dataKey]||0);}).join(" ");
  var area="M"+px(0)+","+py(vals[0])+" "+data.map(function(d,i){return"L"+px(i)+","+py(d[dataKey]||0);}).join(" ")+" L"+px(n-1)+","+(pt+ch)+" L"+px(0)+","+(pt+ch)+" Z";
  var gridLines=[0.25,0.5,0.75,1];
  return e("svg",{viewBox:"0 0 "+w+" "+h,style:{width:"100%",height:height}},
    e("defs",null,e("linearGradient",{id:"ag",x1:"0",y1:"0",x2:"0",y2:"1"},e("stop",{offset:"0%",stopColor:color,stopOpacity:0.3}),e("stop",{offset:"100%",stopColor:color,stopOpacity:0}))),
    gridLines.map(function(p){return e("line",{key:p,x1:pl,y1:pt+ch*(1-p),x2:pl+cw,y2:pt+ch*(1-p),stroke:"rgba(255,255,255,0.05)",strokeWidth:1});}),
    gridLines.map(function(p){return e("text",{key:"t"+p,x:pl-4,y:pt+ch*(1-p)+4,textAnchor:"end",fontSize:9,fill:C.textMuted},"$"+((minV+range*p)/1000).toFixed(0)+"k");}),
    e("path",{d:area,fill:"url(#ag)"}),

function DonutChart({data,size}){
  size=size||160;
  var cx=size/2,cy=size/2,r=size*0.35,ri=size*0.22;
  var total=data.reduce(function(s,d){return s+(d.value||0);},0)||1;
  var angle=-Math.PI/2;
  var slices=data.map(function(d,i){
    var sweep=(d.value/total)*Math.PI*2;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var xi1=cx+ri*Math.cos(angle-sweep),yi1=cy+ri*Math.sin(angle-sweep);
    var xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle);
    var large=sweep>Math.PI?1:0;
    return{path:"M"+x1+","+y1+" A"+r+","+r+" 0 "+large+",1 "+x2+","+y2+" L"+xi2+","+yi2+" A"+ri+","+ri+" 0 "+large+",0 "+xi1+","+yi1+" Z",color:d.color||PC[i%PC.length]};
  });
  return e("svg",{viewBox:"0 0 "+size+" "+size,style:{width:size,height:size}},
    slices.map(function(s,i){return e("path",{key:i,d:s.path,fill:s.color,stroke:C.bg,strokeWidth:1});})
  );
}

          e("div",{style:{padding:"8px 16px",background:"rgba(255,193,80,0.07)",border:"1px solid "+C.border,borderRadius:8,fontSize:12,color:C.textMuted}},"⏰ Best after 4pm ET for full-day data")
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}},

          // Market Briefing
          e(Card,null,
            e("div",{style:{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}},"🌍 Market Briefing"),
            e("div",{style:{fontSize:13,color:C.textMuted,lineHeight:1.8,marginBottom:20}},"Get today's index performance, top stories, sector moves, and market sentiment — researched live by Claude."),
            e("div",{style:{background:"rgba(255,193,80,0.06)",border:"1px solid "+C.border,borderRadius:10,padding:16,marginBottom:24}},
              e("div",{style:{fontSize:11,color:C.textMuted,letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}},"Covers"),
              ["S&P 500, NASDAQ & DOW with exact % changes","Top 3-5 market stories of the day","Sector performance & rotation","Fed / macro news if relevant","Overall sentiment & what to watch tomorrow"].map(function(item,i){
                return e("div",{key:i,style:{display:"flex",gap:8,fontSize:12,color:C.textDim,marginBottom:6}},
                  e("span",{style:{color:C.gold}},"▸"),e("span",null,item));
              })
            ),
            e("a",{
              href:(function(){
                var today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                var prompt="Please give me a daily market briefing for today, "+today+". Search the web and cover: 1) Major index performance (S&P 500, NASDAQ, DOW) with exact % changes, 2) Top 3-5 most important market stories today, 3) Sector performance highlights, 4) Any key economic data or Fed news, 5) Overall market sentiment and what to watch tomorrow. Be specific with numbers and concise.";
                return "https://claude.ai/new?q="+encodeURIComponent(prompt);
              })(),
              target:"_blank",
              style:{display:"block",textAlign:"center",padding:"13px 24px",background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",borderRadius:8,color:"#07080A",fontWeight:700,fontSize:13,letterSpacing:1,textDecoration:"none",marginBottom:8}
            },"Open in Claude.ai →"),
            e("div",{style:{fontSize:11,color:C.textMuted,textAlign:"center"}},"Opens Claude.ai in a new tab with the prompt ready")
          ),

          // Portfolio Briefing
          e(Card,null,
            e("div",{style:{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}},"📊 Portfolio Briefing"),
            e("div",{style:{fontSize:13,color:C.textMuted,lineHeight:1.8,marginBottom:20}},"Analyze your "+holdings.length+" holdings against today's market — performance, news, and buying suggestions."),
            e("div",{style:{background:"rgba(62,207,178,0.06)",border:"1px solid rgba(62,207,178,0.15)",borderRadius:10,padding:16,marginBottom:24}},
              e("div",{style:{fontSize:11,color:C.textMuted,letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}},"Your portfolio snapshot"),
              holdings.length>0?holdings.slice(0,8).map(function(h,i){
                var curVal=h.currentValue||h.value;
                var gain=h.cost>0?((curVal-h.cost)/h.cost*100).toFixed(1):"0";
                var col=parseFloat(gain)>=0?C.teal:C.red;
                return e("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}},
                  e("span",{style:{color:C.gold,fontFamily:"'JetBrains Mono',monospace"}},h.symbol),
                  e("span",{style:{color:col,fontFamily:"'JetBrains Mono',monospace"}},(parseFloat(gain)>=0?"+":"")+gain+"%")
                );
              }):e("div",{style:{fontSize:12,color:C.textMuted}},"No holdings — import your portfolio CSV first"),
              holdings.length>8?e("div",{style:{fontSize:11,color:C.textMuted,marginTop:6}},"+"+( holdings.length-8)+" more positions"):null
            ),
            holdings.length>0?e("a",{
              href:(function(){
                var today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                var holdingsSummary=holdings.map(function(h){
                  var curVal=h.currentValue||h.value;
                  var gain=h.cost>0?((curVal-h.cost)/h.cost*100).toFixed(1):"0";
                  var disp=prices[h.symbol]||(h.csvPrice?{price:h.csvPrice,change:h.csvPlPct}:null);
                  return h.symbol+"(cost:$"+h.cost.toFixed(0)+",value:$"+curVal.toFixed(0)+",P/L:"+gain+"%"+(disp?",price:$"+disp.price.toFixed(2):"")+")";
                }).join(", ");
                var prompt="Today is "+today+". My portfolio: "+holdingsSummary+". Please search the web and give me a portfolio briefing: 1) How did each holding perform today and why? Highlight biggest movers. 2) Any significant news or catalysts for my stocks? 3) Which positions look strong to add to? 4) Any to be cautious about or trim? 5) Suggest 2-3 buying opportunities that complement my portfolio with price context and reasoning.";
                return "https://claude.ai/new?q="+encodeURIComponent(prompt);
              })(),
              target:"_blank",
              style:{display:"block",textAlign:"center",padding:"13px 24px",background:"linear-gradient(135deg,"+C.teal+",#2aa89a)",borderRadius:8,color:"#07080A",fontWeight:700,fontSize:13,letterSpacing:1,textDecoration:"none",marginBottom:8}
            },"Open in Claude.ai →"):
            e("div",{style:{textAlign:"center",padding:20,color:C.textMuted,fontSize:13}},"Import your portfolio CSV first"),
            e("div",{style:{fontSize:11,color:C.textMuted,textAlign:"center"}},"Opens Claude.ai with your full portfolio pre-loaded")
          )
        ),
        e("div",{style:{marginTop:16,padding:16,background:"rgba(255,255,255,0.02)",border:"1px solid "+C.border,borderRadius:10,display:"flex",gap:12,alignItems:"center"}},
          e("span",{style:{fontSize:20}},"💡"),
          e("div",{style:{fontSize:12,color:C.textMuted,lineHeight:1.7}},"Both briefings open Claude.ai in a new tab with your data pre-loaded. Run the Market Briefing anytime during the day. Run the Portfolio Briefing after 4pm ET when US markets close for full-day performance data.")
        )
      ),
      tab==="import"&&e("div",null,
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
          e(Card,null,
            e(SecTitle,null,"Import Account Data"),
            e("p",{style:{color:C.textDim,fontSize:13,marginBottom:20,lineHeight:1.8}},"Drop CSV files below. Each import merges with existing data — re-upload any file to refresh prices or re-parse with updated rules."),
            e(ImportZone,{onImport:doImport})
          ),
          e(Card,null,
            e(SecTitle,null,"Imported Files"),
            e("div",{style:{marginBottom:16}},
              Object.keys(localStorage).filter(function(k){return k.startsWith("fv_raw_");}).length===0
              ?e("div",{style:{color:C.textMuted,fontSize:13,padding:"20px 0"}},"No files imported yet.")
              :Object.keys(localStorage).filter(function(k){return k.startsWith("fv_raw_");}).map(function(k){
                var acct=k.replace("fv_raw_","");
                var raw=localStorage.getItem(k)||"";
                var lines=raw.split("\n").filter(Boolean).length;
                return e("div",{key:k,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}},
                  e("div",null,
                    e("div",{style:{fontSize:13,color:C.text,fontWeight:500}},acct),
                    e("div",{style:{fontSize:11,color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",marginTop:2}},lines+" lines stored")
                  ),
                  e("button",{onClick:function(){
                    var txt=localStorage.getItem(k);
                    if(txt)doImport(txt,acct);
                  },style:{fontSize:11,background:"transparent",border:"1px solid "+C.teal,borderRadius:6,color:C.teal,padding:"4px 10px",fontFamily:"'JetBrains Mono',monospace"}},"↻ re-import")
                );
              })
            ),
            e("div",{style:{paddingTop:16,borderTop:"1px solid "+C.border}},
              e("div",{style:{fontSize:12,color:C.textMuted,marginBottom:12}},"Bulk actions"),
              e("div",{style:{display:"flex",gap:10}},
                e("button",{onClick:reparse,style:{fontSize:12,background:"transparent",border:"1px solid "+C.teal,borderRadius:6,color:C.teal,padding:"6px 14px",fontFamily:"'JetBrains Mono',monospace"}},"↻ Re-parse all"),
                e("button",{onClick:clearAll,style:{fontSize:12,background:"transparent",border:"1px solid "+C.red,borderRadius:6,color:C.red,padding:"6px 14px",fontFamily:"'JetBrains Mono',monospace"}},"🗑 Reset everything")
              )
            )
          )
        ),
        e(Card,null,
          e(SecTitle,null,"Data Summary"),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}},
            e(KPI,{label:"Total Records",value:tx.length,color:C.teal,icon:"📋"}),
            e(KPI,{label:"Accounts",value:[...new Set(tx.map(function(t){return t.account;}))].length,color:C.gold,icon:"🏦"}),
            e(KPI,{label:"Date Range",value:tx.length>0?tx.reduce(function(mn,t){return t.date<mn?t.date:mn;},tx[0].date).slice(0,7):"—",color:C.purple,icon:"📅"}),
            e(KPI,{label:"Holdings",value:holdings.length,color:C.orange,icon:"📊"})
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
})();
</script>
</body>
</html>
